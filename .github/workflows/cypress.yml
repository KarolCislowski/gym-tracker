name: Cypress

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Run Cypress E2E
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
          MONGO_INITDB_DATABASE: admin
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://admin:admin123@localhost:27017/admin?authSource=admin --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Prepare local environment file
        run: cp example.env.local .env.local

      - name: Install dependencies
        run: npm ci

      - name: Seed exercise atlas
        run: npm run db:seed:atlas

      - name: Seed supplement atlas
        run: npm run db:seed:supplements

      - name: Seed Cypress user
        run: npm run db:seed:cypress-user

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          build: npm run build
          start: npm run start
          wait-on: 'http://127.0.0.1:3000'
          wait-on-timeout: 120

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
